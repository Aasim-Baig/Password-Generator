<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Password Generator</title>
    <style>
        :root { --primary: #1a73e8; --dark: #202124; --light: #f8f9fa; --border: #dadce0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 450px; }
        h2 { text-align: center; color: var(--dark); margin-top: 0; }
        
        /* Display & Copy */
        .display-container { display: flex; gap: 10px; margin-bottom: 20px; }
        textarea { flex-grow: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 16px; resize: none; }
        .btn-copy { background: var(--dark); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-copy:hover { background: #3c4043; }

        /* Controls */
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; align-items: center; font-weight: 500; color: #444; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="number"] { width: 60px; padding: 5px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
        
        /* Checkboxes */
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }

        /* Strength Meter */
        .strength-container { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #strength-bar { height: 100%; width: 0%; transition: 0.4s; }

        /* Generate Button */
        .btn-generate { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-generate:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Automated Password Generator</h2>
    
    <div class="display-container">
        <textarea id="password-display" rows="3" readonly placeholder="Your password(s) will appear here..."></textarea>
        <button class="btn-copy" onclick="copyPassword()">Copy</button>
    </div>

    <div class="strength-container">
        <div id="strength-bar"></div>
    </div>

    <div class="control-group">
        <label>Password Length: <span id="length-val">12</span></label>
        <input type="range" id="length-slider" min="8" max="32" value="12" oninput="updateValues()">
    </div>

    <div class="control-group" style="display: flex; justify-content: space-between; align-items: center;">
        <label style="margin: 0;">Mass Generation (Qty):</label>
        <input type="number" id="qty-input" min="1" max="10" value="1">
    </div>

    <div class="checkbox-grid">
        <label class="checkbox-label"><input type="checkbox" id="cb-upper" checked> Uppercase (A-Z)</label>
        <label class="checkbox-label"><input type="checkbox" id="cb-lower" checked> Lowercase (a-z)</label>
        <label class="checkbox-label"><input type="checkbox" id="cb-numbers" checked> Numbers (0-9)</label>
        <label class="checkbox-label"><input type="checkbox" id="cb-symbols" checked> Symbols (!@#$)</label>
        <label class="checkbox-label" style="grid-column: span 2;"><input type="checkbox" id="cb-exclude"> Exclude Ambiguous Chars (i, l, 1, L, o, 0, O)</label>
    </div>

    <button class="btn-generate" onclick="generatePasswords()">Generate Password(s)</button>
</div>

<script>
    // Character Sets
    const chars = {
        upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
        lower: "abcdefghijklmnopqrstuvwxyz",
        numbers: "0123456789",
        symbols: "!@#$%^&*()_+~`|}{[]:;?><,./-="
    };
    const ambiguous = "il1Lo0O";

    function updateValues() {
        document.getElementById('length-val').innerText = document.getElementById('length-slider').value;
    }

    function generatePasswords() {
        const length = parseInt(document.getElementById('length-slider').value);
        const qty = parseInt(document.getElementById('qty-input').value) || 1;
        
        let allowedChars = "";
        if (document.getElementById('cb-upper').checked) allowedChars += chars.upper;
        if (document.getElementById('cb-lower').checked) allowedChars += chars.lower;
        if (document.getElementById('cb-numbers').checked) allowedChars += chars.numbers;
        if (document.getElementById('cb-symbols').checked) allowedChars += chars.symbols;

        if (allowedChars === "") {
            alert("Please select at least one character type!");
            return;
        }

        const exclude = document.getElementById('cb-exclude').checked;
        if (exclude) {
            allowedChars = allowedChars.split('').filter(c => !ambiguous.includes(c)).join('');
        }

        let results = [];
        for (let j = 0; j < qty; j++) {
            let password = "";
            for (let i = 0; i < length; i++) {
                const randomIdx = Math.floor(Math.random() * allowedChars.length);
                password += allowedChars[randomIdx];
            }
            results.push(password);
        }

        document.getElementById('password-display').value = results.join('\n');
        updateStrength(length, document.querySelectorAll('.checkbox-grid input[type="checkbox"]:not(#cb-exclude):checked').length);
    }

    function updateStrength(length, typesCount) {
        const bar = document.getElementById('strength-bar');
        let score = (length * 3) + (typesCount * 10); // Simple algorithm for visual meter
        
        if (score < 40) {
            bar.style.width = "33%"; bar.style.backgroundColor = "#ea4335"; // Weak (Red)
        } else if (score < 60) {
            bar.style.width = "66%"; bar.style.backgroundColor = "#fbbc04"; // Medium (Yellow)
        } else {
            bar.style.width = "100%"; bar.style.backgroundColor = "#34a853"; // Strong (Green)
        }
    }

    function copyPassword() {
        const display = document.getElementById('password-display');
        if (!display.value) return;
        
        display.select();
        navigator.clipboard.writeText(display.value).then(() => {
            const copyBtn = document.querySelector('.btn-copy');
            copyBtn.innerText = "Copied!";
            copyBtn.style.backgroundColor = "#34a853";
            setTimeout(() => {
                copyBtn.innerText = "Copy";
                copyBtn.style.backgroundColor = "var(--dark)";
            }, 1500);
        });
    }

    // Generate one on startup
    window.onload = generatePasswords;
</script>

</body>
</html>
